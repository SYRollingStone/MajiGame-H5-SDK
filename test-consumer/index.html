<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cat Jumper - 由 MajiGame 提供</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 0;
        background: #0f172a;
        color: #fff;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        overflow: hidden;
      }
      .header {
        padding: 12px 20px;
        background: #1e293b;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .header h2 {
        margin: 0;
        font-size: 16px;
        font-weight: 500;
      }
      .badge {
        font-size: 11px;
        opacity: 0.6;
      }
      #game-area {
        position: relative;
        width: 100vw;
        height: calc(100vh - 50px);
        background: linear-gradient(180deg, #1e3a8a, #0f172a);
        cursor: pointer;
        overflow: hidden;
      }
      #score {
        position: absolute;
        top: 20px;
        left: 20px;
        font-size: 32px;
        font-weight: bold;
        text-shadow: 0 2px 6px rgba(0, 0, 0, 0.5);
      }
      .ball {
        position: absolute;
        width: 50px;
        height: 50px;
        background: radial-gradient(circle at 30% 30%, #fbbf24, #d97706);
        border-radius: 50%;
        box-shadow: 0 4px 14px rgba(217, 119, 6, 0.6);
        transform: translate(-50%, -50%);
        animation: pop 0.4s ease-out;
        pointer-events: none;
      }
      @keyframes pop {
        0% {
          transform: translate(-50%, -50%) scale(0.3);
          opacity: 0;
        }
        100% {
          transform: translate(-50%, -50%) scale(1);
          opacity: 1;
        }
      }
      .hint {
        position: absolute;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        opacity: 0.6;
        font-size: 14px;
        text-align: center;
        max-width: 90%;
      }
      .sdk-status {
        position: absolute;
        top: 20px;
        right: 20px;
        font-size: 12px;
        opacity: 0.5;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h2>🐱 Cat Jumper <span class="badge">(模拟接入方游戏)</span></h2>
      <span class="badge" id="version-info">SDK ?</span>
    </div>

    <div id="game-area">
      <div id="score">0</div>
      <div class="sdk-status" id="sdk-status">SDK 状态：加载中</div>
      <div class="hint">
        点击屏幕任意位置 → 得分 +1<br />
        请尝试 F12 / 右键 / Ctrl+U / Ctrl+S — 应当全部被拦截
      </div>
    </div>

    <script src="../dist/maji-sdk.min.js"></script>
    <script>
      MajiSDK.init({
        gameId: 'cat-jumper',
        debug: false,
        security: {
          antiDebug: {
            enabled: true,
            onDetect: 'freeze+tip',
            tipText: '检测到您打开了开发者工具，请关闭后继续游戏',
            tipTitle: '安全提示',
            interval: 1500
          },
          shortcuts: {
            enabled: true,
            blockContextMenu: true,
            blockKeys: true
          },
          domainLock: {
            enabled: true,
            allowedHosts: ['majigame.com', '*.majigame.com', 'localhost', '127.0.0.1'],
            onViolation: 'redirect',
            redirectUrl: 'https://majigame.com'
          }
        }
      })

      document.getElementById('version-info').textContent = 'SDK v' + MajiSDK.VERSION
      document.getElementById('sdk-status').textContent =
        'SDK 状态：isReady=' + MajiSDK.isReady() + ' | host=' + location.hostname

      let score = 0
      const scoreEl = document.getElementById('score')
      const area = document.getElementById('game-area')
      area.addEventListener('click', (e) => {
        score++
        scoreEl.textContent = score
        const ball = document.createElement('div')
        ball.className = 'ball'
        ball.style.left = e.clientX + 'px'
        ball.style.top = e.clientY - 50 + 'px'
        area.appendChild(ball)
        setTimeout(() => ball.remove(), 400)
      })
    </script>
  </body>
</html>
